{% extends 'base.html' %}

{% block content %}
<section class="py-20 bg-white dark:bg-gray-900">
    <div class="container mx-auto px-4 max-w-4xl">
        <div class="bg-white/30 dark:bg-gray-800/30 backdrop-blur-md rounded-xl shadow-xl p-8 border border-gray-200 dark:border-gray-700">
            <h1 class="text-4xl font-bold mb-4 bg-clip-text text-transparent bg-gradient-to-r from-teal-600 to-indigo-600">{{ project.title }}</h1>
            {% if project.image %}
            <div class="mb-8 rounded-lg overflow-hidden shadow-lg">
                <img src="{{ project.image.url }}" alt="{{ project.title }}" class="w-full object-cover">
            </div>
            {% endif %}
            <p class="text-lg text-gray-700 dark:text-gray-300 leading-relaxed mb-8">{{ project.description }}</p>

            <h2 class="text-2xl font-semibold mb-2">Tech Stack</h2>
            <div class="flex flex-wrap gap-2 mb-8">
                {% for tech in project.tech_list %}
                <span class="px-3 py-1 bg-gray-200 dark:bg-gray-700 rounded-full text-sm hover:bg-teal-600 hover:text-white transition">{{ tech }}</span>
                {% endfor %}
            </div>

            <div class="flex space-x-4">
                <a href="{{ project.github_link }}" target="_blank" rel="noopener" class="bg-teal-600 text-white px-6 py-2 rounded hover:bg-teal-700 transition inline-flex items-center"><i class="fab fa-github mr-2"></i> GitHub Repository</a>
                {% if project.live_demo_link %}
                <a href="{{ project.live_demo_link }}" target="_blank" rel="noopener" class="border border-teal-600 text-teal-600 dark:text-teal-400 px-6 py-2 rounded hover:bg-teal-600 hover:text-white transition inline-flex items-center"><i class="fas fa-external-link-alt mr-2"></i> Live Demo</a>
                {% endif %}
            </div>
        </div>
    </div>
</section>
{% endblock %}
