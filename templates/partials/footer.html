<footer class="bg-gray-100 dark:bg-gray-800 py-8 mt-20">
    <div class="container mx-auto px-4 text-center text-gray-600 dark:text-gray-400">
        <p>&copy; {% now "Y" %} {% if profile %}{{ profile.name }}{% else %}John Doe{% endif %}. All rights reserved.</p>
        <div class="flex justify-center space-x-4 mt-4">
            {% if profile and profile.github_url %}
            <a href="{{ profile.github_url }}" target="_blank" rel="noopener" class="hover:text-blue-600 dark:hover:text-blue-400">GitHub</a>
            {% endif %}
            {% if profile and profile.linkedin_url %}
            <a href="{{ profile.linkedin_url }}" target="_blank" rel="noopener" class="hover:text-blue-600 dark:hover:text-blue-400">LinkedIn</a>
            {% endif %}
            {% if profile and profile.email %}
            <a href="mailto:{{ profile.email }}" class="hover:text-blue-600 dark:hover:text-blue-400">Email</a>
            {% endif %}
        </div>
    </div>
</footer>
