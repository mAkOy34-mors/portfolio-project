{% load static %}
<nav id="navbar" class="navbar">

  <div class="navbar-inner" style="display:flex;flex-direction:row;align-items:center;width:100%;height:64px;flex-wrap:nowrap;">

    <!-- Logo — far left -->
    <a href="{% url 'home' %}" class="navbar-logo" style="display:inline-flex;align-items:center;flex-shrink:0;width:auto;">
      {% if profile %}{{ profile.name }}{% else %}Micho Moreno{% endif %}
    </a>

    <!-- Nav Links — right side -->
    <div class="navbar-links">
      <a href="{% url 'home' %}" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a>
      <a href="{% url 'about' %}" class="nav-link {% if '/about/' in request.path %}active{% endif %}">About</a>
      <a href="{% url 'skills' %}" class="nav-link {% if '/skills/' in request.path %}active{% endif %}">Skills</a>
      <a href="{% url 'projects' %}" class="nav-link {% if '/projects/' in request.path %}active{% endif %}">Projects</a>
      <a href="{% url 'education' %}" class="nav-link {% if '/education/' in request.path %}active{% endif %}">Education</a>
      <a href="{% url 'contact' %}" class="nav-link {% if '/contact/' in request.path %}active{% endif %}">Contact</a>
    </div>

    <!-- Hamburger (mobile only) — type="button" prevents default form submit -->
    <button type="button" id="hamburger" class="hamburger-btn" aria-label="Open menu" aria-expanded="false">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>

  </div>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="mobile-menu">
    <a href="{% url 'home' %}" class="mobile-link {% if request.path == '/' %}active{% endif %}">Home</a>
    <a href="{% url 'about' %}" class="mobile-link {% if '/about/' in request.path %}active{% endif %}">About</a>
    <a href="{% url 'skills' %}" class="mobile-link {% if '/skills/' in request.path %}active{% endif %}">Skills</a>
    <a href="{% url 'projects' %}" class="mobile-link {% if '/projects/' in request.path %}active{% endif %}">Projects</a>
    <a href="{% url 'education' %}" class="mobile-link {% if '/education/' in request.path %}active{% endif %}">Education</a>
    <a href="{% url 'contact' %}" class="mobile-link {% if '/contact/' in request.path %}active{% endif %}">Contact</a>
  </div>

</nav>
