{% extends 'base.html' %}
{% block title %}404 – Not Found{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex flex-col items-center justify-center text-center px-4">
  <div class="font-black text-9xl font-display text-teal-200 dark:text-teal-900 leading-none mb-6">404</div>
  <h1 class="text-3xl font-bold font-display mb-3">Page Not Found</h1>
  <p class="text-gray-500 dark:text-gray-400 mb-8 max-w-md">The page you're looking for doesn't exist or has been moved.</p>
  <a href="{% url 'home' %}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-semibold text-sm bg-teal-600 text-white hover:bg-teal-700 shadow-lg transition-all hover:-translate-y-0.5">
    <i class="fas fa-home text-xs"></i> Back to Home
  </a>
</div>
{% endblock %}
